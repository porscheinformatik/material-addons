<mat-card class="config-panel">
  <mat-card-header>
    <mat-card-title>Optional Config</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="controls">
      <mat-slide-toggle [(ngModel)]="showActionIcons" (ngModelChange)="onActionIconsChange()">Show Action Icons</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="showPreviewAction" (ngModelChange)="updateConfig()">Show Preview Action</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="showDownloadAction" (ngModelChange)="updateConfig()">Show Download Action</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="showDeleteAction" (ngModelChange)="updateConfig()">Show Delete Action</mat-slide-toggle>
      <mat-slide-toggle [(ngModel)]="generatePdfThumbnails" (ngModelChange)="onGeneratePdfThumbnailsChange()">Generate PDF Thumbnails</mat-slide-toggle>
    </div>

    <div class="config-toggles">
      <div class="thumbnail-size-control">
        <label>Thumbnail Size:</label>
        <mat-button-toggle-group [(ngModel)]="thumbnailSize" (ngModelChange)="updateConfig()" aria-label="Thumbnail Size">
          <mat-button-toggle value="sm">Small</mat-button-toggle>
          <mat-button-toggle value="md">Medium</mat-button-toggle>
          <mat-button-toggle value="lg">Large</mat-button-toggle>
        </mat-button-toggle-group>
      </div>

      <div class="excel-row-limit-control">
        <label>Excel Preview Row Limit:</label>
        <mat-button-toggle-group [(ngModel)]="excelPreviewRowLimit" (ngModelChange)="updateConfig()" aria-label="Excel Preview Row Limit">
          <mat-button-toggle [value]="50">50</mat-button-toggle>
          <mat-button-toggle [value]="200">200 (default)</mat-button-toggle>
          <mat-button-toggle [value]="Infinity">Show All</mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<mad-file-upload
  [multiple]="true"
  [accept]="['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg', 'ico', 'pdf', 'docx', 'xlsx', 'xls', 'xlsm', 'xlsb', 'ods', 'csv']"
  [text]="'Upload Files'"
  [id]="'file-preview-upload'"
  (fileEmitter)="onFilesUploaded($event)"
/>

<mad-file-preview
  [items]="items"
  [config]="config"
  (deleteClicked)="onDeleteClicked($event)"
/>
