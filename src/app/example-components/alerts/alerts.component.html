<mad-alert
  type="success"
  message="Vehicle details were saved successfully."
  size="small"
  (close)="onCloseAlert()"
  (action)="onActionAlert()"
>
</mad-alert>

<mad-alert
  type="info"
  message="New price information is available for this configuration."
  size="medium"
  actionText="Review"
  (close)="onCloseAlert()"
  (action)="onActionAlert()"
>
</mad-alert>

<mad-alert
  type="warning"
  message="Changing the market will reset the currently selected filters."
  size="large"
  actionText="Continue"
  (close)="onCloseAlert()"
  (action)="onActionAlert()"
>
</mad-alert>

<mad-alert
  type="error"
  message="The offer could not be submitted because required customer data is missing."
  actionText="Open details"
  [closeable]="false"
  (close)="onCloseAlert()"
  (action)="onActionAlert()"
>
</mad-alert>
