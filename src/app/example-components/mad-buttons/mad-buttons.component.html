<div class="container">
  Filled Buttons
<div class="all-row">
  <mad-primary-button [title]="'Primary'">Primary</mad-primary-button>
  <mad-primary-button [title]="'Primary'" [disabled]="true">Primary</mad-primary-button>
</div>
  Outline Buttons
  <div class="all-row">
    <mad-outline-button [title]="'Outline'">Outline</mad-outline-button>
    <mad-outline-button [title]="'Outline'" [color]="'accent'">Accent</mad-outline-button>
    <mad-outline-button [title]="'Outline'" [color]="'warn'">Warning</mad-outline-button>
    <mad-outline-button [title]="'Outline'" [disabled]="true">Disabled</mad-outline-button>
  </div>
<mad-danger-button>Delete forever</mad-danger-button>
<mad-link-button [title]="'Add Item'">Add Item</mad-link-button>
<mad-primary-button [title]="'Disabled'" [disabled]="true">Disabled</mad-primary-button>
<mad-icon-button [title]="'Create'">
  <mat-icon>create</mat-icon>
</mad-icon-button>
