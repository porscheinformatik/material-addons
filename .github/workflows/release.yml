name: Deploy Release

# The job builds the mat-addons, publishes in on npmjs and deploys a new demo on ghpages

on:
  release:
    types: [published]

permissions:
  id-token: write # Required for OIDC
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm --prefix ./projects/material-addons version ${{ github.event.release.tag_name }}
      - run: npm run publish:mat-add
      - name: Build previous demo (material-2)
        run: ./scripts/build-branch-demo.sh material-2 m2
      - name: Build latest demo (master)
        run: npm run build:mat-add && npm run build:demo
      - name: Publish previous demo to gh-pages/m2
        run: npx angular-cli-ghpages --no-silent --dir=dist/material-addons-project-m2 --dest=m2
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Publish latest demo to gh-pages
        run: npx angular-cli-ghpages --no-silent --dir=dist/material-addons-project
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  notify_teams_channel:
    name: Notify MAD Release Teams Channel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@master
      - name: Microsoft Teams Notification
        uses: skitionek/notify-microsoft-teams@master
        if: success()
        with:
          webhook_url: ${{ secrets.MSTEAMS_WEBHOOK }}
          overwrite: '{title: `New release published! ${workflow}`}'
